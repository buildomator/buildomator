name: Install smoke (fresh Debian)

# Catches the v2.42.0-class bug where the bundled SDK works on the
# maintainer's laptop (which has an external gsd-sdk on PATH masking
# missing-deps issues) but breaks on a clean install with no prior
# get-shit-done-cc. Runs the same 6-test matrix that was used to
# catch the original bug on 192.168.1.170, but in a debian:trixie
# container so it fires on every push, every PR, and every tag.

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  fresh-debian-install:
    name: gsd-sdk works on debian:trixie with no prior GSD install
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Install minimum prereqs (nodejs, ca-certificates, git for checkout)
        # ca-certificates needed for HTTPS git clone, git for actions/checkout's
        # `--depth=1` clone, nodejs for the bundled SDK runtime. Deliberately
        # NOT installing `npm` or `get-shit-done-cc` -- the whole point of
        # this job is to prove the plugin needs neither.
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends nodejs ca-certificates git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity-check the test environment is genuinely fresh
        run: |
          set -e
          echo "node version: $(node --version)"
          echo "npm available: $(command -v npm || echo 'NO -- correct, simulating fresh user')"
          echo "gsd-sdk available before plugin: $(command -v gsd-sdk || echo 'NO -- correct, simulating fresh user')"
          test -f sdk/dist/cli.js
          test -x bin/gsd-sdk
          echo "✓ plugin tree complete, sdk/dist/cli.js: $(stat -c%s sdk/dist/cli.js) bytes"
          test ! -d sdk/node_modules
          echo "✓ no sdk/node_modules in the tree (proves bundle must be self-contained)"

      - name: Test 1 - bin/gsd-sdk wrapper resolves (CLAUDE_PLUGIN_ROOT-driven)
        run: |
          set -e
          out=$(CLAUDE_PLUGIN_ROOT="$PWD" bin/gsd-sdk --version)
          echo "out: $out"
          echo "$out" | grep -q "gsd-sdk v" || { echo "FAIL: expected 'gsd-sdk v...' in output"; exit 1; }

      - name: Test 2 - PATH-based resolution (simulates Claude Code plugin loader)
        run: |
          set -e
          export PATH="$PWD/bin:$PATH"
          export CLAUDE_PLUGIN_ROOT="$PWD"
          out=$(gsd-sdk --version)
          echo "out: $out"
          echo "$out" | grep -q "gsd-sdk v" || { echo "FAIL: PATH resolution did not find bundled wrapper"; exit 1; }

      - name: "Test 3 - real query: state.load on a synthetic project"
        run: |
          set -e
          mkdir -p /tmp/smoke-project && cd /tmp/smoke-project
          git init -q
          mkdir -p .planning && echo '{}' > .planning/config.json
          out=$(CLAUDE_PLUGIN_ROOT="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/bin/gsd-sdk" query state.load 2>&1)
          echo "$out" | head -10
          echo "$out" | grep -q '"config"' || { echo "FAIL: state.load did not return a config block"; exit 1; }

      - name: Test 4 - query commands lists the plugin's command surface
        run: |
          set -e
          out=$(CLAUDE_PLUGIN_ROOT="$PWD" bin/gsd-sdk query commands 2>&1)
          echo "$out" | head -5
          echo "$out" | grep -q '"agent-skills"' || { echo "FAIL: query commands missing agent-skills"; exit 1; }

      - name: Test 5 - MCP stdio framing regression (issue #3)
        run: node tests/mcp-stdio-framing.test.cjs

      - name: Test 6 - workflow-style callsite (naked gsd-sdk via PATH)
        run: |
          set -e
          export PATH="$PWD/bin:$PATH"
          export CLAUDE_PLUGIN_ROOT="$PWD"
          out=$(bash -c 'gsd-sdk query commands 2>&1' | head -5)
          echo "$out"
          echo "$out" | grep -q '"agent-skills"' || { echo "FAIL: naked gsd-sdk callsite did not resolve via PATH"; exit 1; }

      - name: Verify no node_modules was created during the run
        # If any step accidentally invoked `npm install` or `npx`, this would
        # fail. The whole point of bundling is to not need any.
        run: |
          set -e
          test ! -d sdk/node_modules || { echo "FAIL: sdk/node_modules was created during the run"; ls -la sdk/node_modules; exit 1; }
          test ! -d node_modules || { echo "FAIL: root node_modules was created during the run"; ls -la node_modules; exit 1; }
          echo "✓ no node_modules touched"

      - name: Summary
        run: |
          echo "─────────────────────────────────────────────"
          echo " Install smoke PASS on debian:trixie"
          echo " Plugin: $(grep '\"version\"' package.json | head -1)"
          echo " Bundled SDK: $(stat -c%s sdk/dist/cli.js) bytes, no node_modules"
          echo "─────────────────────────────────────────────"

  bm-package-smoke:
    name: bm package resolves via its own CLAUDE_PLUGIN_ROOT (BUILD-03)
    # Proves the committed dist/bm package (from plan 12-01) resolves its own
    # SDK and hooks entirely via ${CLAUDE_PLUGIN_ROOT}=dist/bm, while the
    # repo/cache identity stays gsd-plugin (D-10/D-11/D-12). Same fresh
    # debian:trixie container and prereqs as the gsd job above, which is left
    # byte-untouched.
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Install minimum prereqs (nodejs, ca-certificates, git for checkout)
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends nodejs ca-certificates git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Manifest sanity - dist/bm manifest exists, name is bm, version matches root
        run: |
          set -e
          node -e '
            const fs=require("fs");
            const bm=JSON.parse(fs.readFileSync("dist/bm/.claude-plugin/plugin.json","utf8"));
            const root=JSON.parse(fs.readFileSync(".claude-plugin/plugin.json","utf8"));
            if(bm.name!=="bm"){console.error("FAIL: dist/bm manifest name is "+bm.name+", expected bm");process.exit(1);}
            if(bm.version!==root.version){console.error("FAIL: dist/bm version "+bm.version+" != root "+root.version);process.exit(1);}
            console.log("OK bm manifest: name=bm version="+bm.version);
          '

      - name: bm Test 1 - dist/bm/bin/gsd-sdk resolves via its own CLAUDE_PLUGIN_ROOT
        run: |
          set -e
          # chmod defensively in case the git copy lost the exec bit; report if it did.
          if [ ! -x dist/bm/bin/gsd-sdk ]; then
            echo "NOTE: dist/bm/bin/gsd-sdk lost its exec bit in the copy; restoring +x"
            chmod +x dist/bm/bin/gsd-sdk
          fi
          out=$(CLAUDE_PLUGIN_ROOT="$PWD/dist/bm" dist/bm/bin/gsd-sdk --version)
          echo "out: $out"
          echo "$out" | grep -q "gsd-sdk v" || { echo "FAIL: expected 'gsd-sdk v...' from the bm wrapper"; exit 1; }

      - name: "bm Test 3 - real query: state.load via the bm root on a synthetic project"
        run: |
          set -e
          mkdir -p /tmp/bm-smoke-project && cd /tmp/bm-smoke-project
          git init -q
          mkdir -p .planning && echo '{}' > .planning/config.json
          out=$(CLAUDE_PLUGIN_ROOT="$GITHUB_WORKSPACE/dist/bm" "$GITHUB_WORKSPACE/dist/bm/bin/gsd-sdk" query state.load 2>&1)
          echo "$out" | head -10
          echo "$out" | grep -q '"config"' || { echo "FAIL: bm state.load did not return a config block"; exit 1; }

      - name: bm Test - primary-path-wins hook proof (tripwire fallback must NOT fire)
        run: |
          set -e
          # Plant a tripwire in BOTH cache candidates the hook could fall back
          # to: the legacy gsd path and the stamped bm path. If the hook ever
          # resolves via either hardcoded fallback instead of
          # ${CLAUDE_PLUGIN_ROOT}, that tripwire fires (marker to stderr, exit 7)
          # and the assertions below catch it.
          for seg in gsd bm; do
            TRIP="$HOME/.claude/plugins/cache/gsd-plugin/$seg/9.9.9/bin"
            mkdir -p "$TRIP"
            printf '%s\n' 'process.stderr.write("FALLBACK-FIRED\n");process.exit(7);' > "$TRIP/gsd-tools.cjs"
          done

          # Extract the first SessionStart hook command verbatim from dist/bm.
          cmd=$(node -e 'process.stdout.write(require("'"$GITHUB_WORKSPACE"'/dist/bm/hooks/hooks.json").hooks.SessionStart[0].hooks[0].command)')

          mkdir -p /tmp/bm-hook-project && cd /tmp/bm-hook-project
          git init -q
          mkdir -p .planning

          # Run the hook with the bm root as CLAUDE_PLUGIN_ROOT and {} on stdin.
          set +e
          err=$(echo '{}' | CLAUDE_PLUGIN_ROOT="$GITHUB_WORKSPACE/dist/bm" bash -c "$cmd" 2>&1 >/dev/null)
          rc=$?
          set -e
          echo "hook exit: $rc"
          echo "hook stderr: [$err]"
          [ "$rc" -eq 0 ] || { echo "FAIL: bm SessionStart hook exited $rc (expected 0)"; exit 1; }
          echo "$err" | grep -q "plugin path stale" && { echo "FAIL: hook resolved a non-primary path (stale-path message)"; exit 1; }
          echo "$err" | grep -q "FALLBACK-FIRED" && { echo "FAIL: hook fell back to a cache tripwire (gsd or bm)"; exit 1; }
          echo "OK: bm hook resolved via the primary CLAUDE_PLUGIN_ROOT path; neither the gsd nor the bm fallback tripwire fired"

      - name: bm Test - cache-id invariant (marketplace name still gsd-plugin, bm source ./dist/bm)
        run: |
          set -e
          node -e '
            const m=require("./.claude-plugin/marketplace.json");
            const bm=m.plugins.find(p=>p.name==="bm");
            if(m.name!=="gsd-plugin"){console.error("FAIL: marketplace name is "+m.name+", expected gsd-plugin");process.exit(1);}
            if(!bm||bm.source!=="./dist/bm"){console.error("FAIL: bm entry source is "+(bm&&bm.source)+", expected ./dist/bm");process.exit(1);}
            console.log("OK: cache id gsd-plugin, bm source ./dist/bm (cache path ~/.claude/plugins/cache/gsd-plugin/bm/<version>/)");
          '

      - name: bm hook fallbacks target the bm cache dir (both runtime carriers)
        run: |
          set -e
          node -e '
            const fs=require("fs");
            const count=(s,needle)=>s.split(needle).length-1;
            const fail=(m)=>{console.error("FAIL: "+m);process.exit(1);};

            // Carrier 1: the inline node resolvers in hooks.json.
            const hooks=fs.readFileSync("dist/bm/hooks/hooks.json","utf8");
            if(count(hooks,"cache/gsd-plugin/bm")!==17) fail("hooks.json bm-path occurrences != 17 (got "+count(hooks,"cache/gsd-plugin/bm")+")");
            if(count(hooks,"cache/gsd-plugin/gsd")!==0) fail("hooks.json still has gsd-path fallbacks (got "+count(hooks,"cache/gsd-plugin/gsd")+")");
            if(count(hooks,"gsd-tools.cjs")<1) fail("hooks.json lost the gsd-tools.cjs identity token");

            // Carrier 2: the run-bash-hook launcher resolves the cache dir itself.
            const launcher=fs.readFileSync("dist/bm/hooks/run-bash-hook.cjs","utf8");
            if(count(launcher,"\x27gsd-plugin\x27, \x27bm\x27")!==1) fail("run-bash-hook quoted bm pair != 1 (got "+count(launcher,"\x27gsd-plugin\x27, \x27bm\x27")+")");
            if(count(launcher,"\x27gsd-plugin\x27, \x27gsd\x27")!==0) fail("run-bash-hook still has the quoted gsd pair");
            if(count(launcher,"cache/gsd-plugin/gsd")!==0) fail("run-bash-hook still has a gsd-path literal");

            console.log("OK: both hook fallback carriers target the bm cache dir; identity tokens survive");
          '

      - name: bm MCP server lists identical tools and resources (dynamic gsd-vs-bm)
        run: |
          set -e
          node -e '
            const { spawn } = require("child_process");
            // Spawn a server, send initialize + tools/list + resources/list over
            // ndjson stdio, and return sorted tool-name and resource-uri arrays.
            // No tool names, resource URIs, or counts are hardcoded anywhere: the
            // proof is that the two servers report identical, non-empty surfaces.
            function surface(script){
              return new Promise((resolve,reject)=>{
                const child=spawn(process.execPath,[script],{stdio:["pipe","pipe","pipe"]});
                let out="";let err="";
                const timer=setTimeout(()=>{child.kill("SIGKILL");reject(new Error("timeout ("+script+") stderr="+err.trim()));},5000);
                child.stdout.on("data",b=>out+=b.toString("utf8"));
                child.stderr.on("data",b=>err+=b.toString("utf8"));
                child.on("error",e=>{clearTimeout(timer);reject(e);});
                child.on("close",()=>{
                  clearTimeout(timer);
                  const msgs=out.split("\n").filter(l=>l.trim().startsWith("{")).map(l=>{try{return JSON.parse(l);}catch{return null;}}).filter(Boolean);
                  const byId=id=>msgs.find(m=>m.id===id);
                  const toolsResp=byId(2), resResp=byId(3);
                  if(!toolsResp||!toolsResp.result||!Array.isArray(toolsResp.result.tools)) return reject(new Error("no tools/list array from "+script));
                  if(!resResp||!resResp.result||!Array.isArray(resResp.result.resources)) return reject(new Error("no resources/list array from "+script));
                  const tools=toolsResp.result.tools.map(t=>t.name).sort();
                  const resources=resResp.result.resources.map(r=>r.uri).sort();
                  resolve({tools,resources});
                });
                child.stdin.write(JSON.stringify({jsonrpc:"2.0",id:1,method:"initialize",params:{protocolVersion:"2024-11-05",capabilities:{},clientInfo:{name:"bm-parity-smoke",version:"1.0"}}})+"\n");
                child.stdin.write(JSON.stringify({jsonrpc:"2.0",id:2,method:"tools/list"})+"\n");
                child.stdin.write(JSON.stringify({jsonrpc:"2.0",id:3,method:"resources/list"})+"\n");
                setTimeout(()=>{child.stdin.end();setTimeout(()=>child.kill("SIGTERM"),200);},800);
              });
            }
            (async()=>{
              const assert=require("assert");
              const gsd=await surface("mcp/server.cjs");
              const bm=await surface("dist/bm/mcp/server.cjs");
              assert.ok(gsd.tools.length>0,"gsd server listed 0 tools");
              assert.ok(gsd.resources.length>0,"gsd server listed 0 resources");
              assert.deepStrictEqual(bm.tools,gsd.tools,"bm tool list differs from gsd");
              assert.deepStrictEqual(bm.resources,gsd.resources,"bm resource list differs from gsd");
              console.log("OK: bm MCP server lists the same "+bm.tools.length+" tools and "+bm.resources.length+" resources as gsd");
            })().catch(e=>{console.error("FAIL: "+e.message);process.exit(1);});
          '

      - name: Summary
        run: |
          BMVER=$(node -e 'process.stdout.write(require("./dist/bm/.claude-plugin/plugin.json").version)')
          echo "─────────────────────────────────────────────"
          echo " bm package smoke PASS on debian:trixie"
          echo " bm version tested: $BMVER (resolved via CLAUDE_PLUGIN_ROOT=dist/bm)"
          echo " gsd fallback tripwire: never fired; cache id: gsd-plugin"
          echo "─────────────────────────────────────────────"
